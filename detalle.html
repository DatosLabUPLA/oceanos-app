    <!-- Lógica de detalle: obtiene datos por ID desde la API y renderiza en la vista -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const apiUrl = 'https://oceanos-api.datoslab.cl';
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('id');
            const normalizeKey = (key) => String(key || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/\s+/g, '')
                .replace(/[^a-zA-Z0-9_]/g, '')
                .toLowerCase();
            const getField = (item, ...candidates) => {
                if (!item || typeof item !== 'object') return '';
                const entries = Object.entries(item);
                const lookup = new Map(entries.map(([key, value]) => [normalizeKey(key), value]));
                for (const candidate of candidates) {
                    const value = lookup.get(normalizeKey(candidate));
                    if (value !== undefined && value !== null) return value;
                }
                return '';
            };
            const normalizeItemDetails = (item) => ({
                ...item,
                Nombre_Cientifico: getField(item, 'Nombre_Cientifico', 'Nombre Cientifico', 'Nombre científico'),
                Nombre_Comun: getField(item, 'Nombre_Comun', 'Nombre Comun', 'Nombre común'),
                Url_Imagen: getField(item, 'Url_Imagen', 'URL_Imagen', 'Url Imagen'),
                Fotografo: getField(item, 'Fotografo', 'Fotógrafo'),
                Habitat: getField(item, 'Habitat', 'Hábitat'),
                Descripcion: getField(item, 'Descripcion', 'Descripción'),
                Reproduccion: getField(item, 'Reproduccion', 'Reproducción'),
                Alimentacion: getField(item, 'Alimentacion', 'Alimentación'),
                Informacion_Adicional: getField(item, 'Informacion_Adicional', 'Información_Adicional', 'Informacion adicional', 'Información adicional'),
                Datos_curiosos: getField(item, 'Datos_curiosos', 'Datos_Curiosos', 'Datos curiosos'),
                Defensa: getField(item, 'Defensa')
            });

            // Obtiene detalles de un elemento por ID
            const fetchItemDetails = async (id) => {
                try {
                    const response = await fetch(`${apiUrl}/datos/${id}`);
                    const data = await response.json();
                    return data;
                } catch (error) {
                    console.error('Error fetching item details:', error);
                }
            };

            // Construye la URL local de la imagen a partir del nombre entregado por la API
            const buildImageUrl = (imageName) => {
                return `IMAGENES/${imageName}`; // Ajusta la ruta según la estructura de tu repositorio
            };

            // Llena el carrusel con las imágenes entregadas por la API
            const updateCarouselImages = (imageNames) => {
                const carouselInner = document.querySelector('.carousel-inner');
                carouselInner.innerHTML = '';

                if (imageNames && typeof imageNames === 'string') {
                    const imagesArray = imageNames.split(',');

                    imagesArray.forEach((imageName, index) => {
                        const carouselItem = document.createElement('div');
                        carouselItem.classList.add('carousel-item');
                        if (index === 0) {
                            carouselItem.classList.add('active');
                        }

                        const imgElement = document.createElement('img');
                        imgElement.src = buildImageUrl(imageName.trim());
                        imgElement.classList.add('d-block', 'w-100');

                        carouselItem.appendChild(imgElement);
                        carouselInner.appendChild(carouselItem);
                    });
                } else {
                    console.error('Datos de imagen inválidos o ausentes.');
                }
            };

            // Renderiza los detalles del elemento en la tabla y el carrusel
            const renderItemDetails = (data) => {
                const item = normalizeItemDetails(data);
                document.getElementById('nombreCientifico').innerText = item.Nombre_Cientifico || 'N/A';
                document.getElementById('nombreComun').innerText = item.Nombre_Comun || 'N/A';
                document.getElementById('habitat').innerText = item.Habitat || 'N/A';
                document.getElementById('descripcion').innerText = item.Descripcion || 'N/A';
                document.getElementById('reproduccion').innerText = item.Reproduccion || 'N/A';
                document.getElementById('alimentacion').innerText = item.Alimentacion || 'N/A';
                document.getElementById('informacionAdicional').innerText = item.Informacion_Adicional || 'N/A';
                document.getElementById('datosCuriosos').innerText = item.Datos_curiosos || 'N/A';
                document.getElementById('defensa').innerText = item.Defensa || 'N/A';
                document.getElementById('Descripcion_Imagen').innerText = (item.Fotografo ? `Fotografía: ${item.Fotografo}` : 'N/A');

                // Actualizar el carrusel con las imágenes de la API
                updateCarouselImages(item.Url_Imagen);
            };

            // Flujo principal: obtener el detalle y renderizar
            fetchItemDetails(itemId)
                .then(data => renderItemDetails(data));
        });
    </script>
